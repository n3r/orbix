name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: orbix
          POSTGRES_PASSWORD: orbix
          POSTGRES_DB: orbix
        ports:
          - "1062:5432"
        options: >-
          --health-cmd "pg_isready -U orbix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "1063:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://orbix:orbix@localhost:1062/orbix
      REDIS_URL: redis://localhost:1063
      API_PORT: "1061"
      WEB_PORT: "1060"
      SESSION_SECRET: ci-session-secret-32-characters-long
      WEB_ORIGIN: http://localhost:1060

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json "packageManager" field (pnpm@10.22.0). Specifying
      # both is now a hard error (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @orbix/db exec prisma generate

      - name: Apply database migrations
        run: pnpm --filter @orbix/db exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # End-to-end (Playwright) — the only guard of the api↔web cookie/CORS
      # integration. CI's Postgres is ephemeral, so the destructive global-setup
      # wipe is safe (E2E_ALLOW_DB_RESET=1). ffmpeg is needed: playback.spec
      # generates a tiny seed video.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Playwright browser
        run: pnpm --filter @orbix/web exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm --filter @orbix/web test:e2e
        env:
          E2E_ALLOW_DB_RESET: "1"
