name: Feature request
description: Suggest a change or new capability for Orbix.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: constraints
    attributes:
      label: Orbix constraints
      options:
        - label: This can preserve offline browsing/playback after scan.
        - label: This does not require view-time calls to metadata providers.
        - label: This can be server-enforced for kids profiles if catalog/playback access is affected.
        - label: This does not require modifying user media files.
